services:
    stripe-mock:
        build:
            context: .
            dockerfile: Dockerfile
        image: sbc-cmo-stripe-mock-api:latest
        container_name: stripe-mock-api
        ports:
            - '${PORT:-4242}:4242'
        volumes:
            # Mount your local data/ directory so the container can read JSON files
            - ./data:/app/data
        environment:
            - PORT=4242
            - STRIPE_API_KEYS=${STRIPE_API_KEYS:-sk_test_mock}
            - BASE_URL=${BASE_URL:-http://localhost:4242}
            - DATA_DIR=/app/data
        restart: unless-stopped
        healthcheck:
            test: ['CMD', 'wget', '-qO-', 'http://localhost:4242/health']
            interval: 30s
            timeout: 5s
            retries: 3
            start_period: 10s
